# ============================================================================
#  Save this file at:  .github/workflows/profile.yml   (in your ayuvgr8/ayuvgr8 repo)
#  Powers all three dynamic README pieces:
#    1. Contribution snake   -> "output" branch
#    2. 3D isometric skyline -> "profile-3d-contrib/" folder on main
#    3. Analytics dashboard  -> "profile-summary-card-output" branch
#
#  Runs every 12 hours + on-demand from the Actions tab.
#  ⚠️ Requires: Settings -> Actions -> General -> Workflow permissions ->
#     "Read and write permissions" -> Save.
# ============================================================================

name: Generate Profile Assets

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------- 1. Contribution snake ----------
  snake:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00E5A0&color_dots=0A0D14,1B3A6B,2E5FA8,4F8EF7,00E5A0
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- 2. 3D isometric contribution skyline ----------
  #  NOTE: this action reads the username from an ENV var, not a `with:` input.
  skyline-3d:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & push SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: update 3D contribution graph [skip ci]" || echo "no changes"
          git push

  # ---------- 3. Analytics dashboard cards ----------
  summary-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 5
