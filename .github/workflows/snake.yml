# Save this file at:  .github/workflows/snake.yml   (inside your ayuvgr8/ayuvgr8 repo)
# It regenerates the contribution-snake SVGs every 12 hours and pushes them to the "output" branch,
# which the README pulls from. You can also run it manually from the Actions tab the first time.

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it on-demand from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00E5A0&color_dots=0A0D14,1B3A6B,2E5FA8,4F8EF7,00E5A0

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
